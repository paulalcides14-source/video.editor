<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CapCut Web Clone Pro (Light)</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="editor">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="tb-label">Editor</span>
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="btn-select">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 2l4.5 10 2-4 4-2L2 2z" fill="currentColor"/></svg>
      Seleccionar
    </button>
    <button class="tb-btn" id="btn-split">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5"/><path d="M3 4l4-3 4 3M3 10l4 3 4-3" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      Split
    </button>
    <button class="tb-btn" id="btn-trim">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="11" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="11" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M3 9V3l4 3 4-7" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      Trim
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 4V2h4v2" stroke="currentColor" stroke-width="1.2" fill="none"/></svg> Texto</button>
    <button class="tb-btn"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M1 7a6 6 0 0012 0A6 6 0 001 7z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M7 1c-2 2-2 10 0 12M1 7h12" stroke="currentColor" stroke-width="1.2"/></svg> Transición</button>
    <button class="tb-btn"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Efectos</button>
    <div class="tb-spacer"></div>
    <button class="tb-btn danger" id="btn-delete">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M12 4l-1 9H3L2 4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      Eliminar
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" style="background:var(--accent);color:#fff;border-color:var(--accent);" id="btn-export">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 5-10 5V2z" fill="white"/></svg> Exportar
    </button>
  </div>

  <!-- MAIN ROW -->
  <div class="top-row">

    <!-- RESOURCES PANEL -->
    <div class="panel resources">
      <div class="panel-header">
        <span class="panel-title">Recursos</span>
        <button class="icon-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="res-tabs">
        <button class="res-tab active">Video</button>
        <button class="res-tab">Audio</button>
        <button class="res-tab">Fotos</button>
      </div>
      <div class="media-grid" id="mediaGrid"></div>
      <div class="add-media">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Añadir archivos
      </div>
    </div>

    <!-- MONITOR -->
    <div class="panel monitor">
      <div class="preview-area" id="previewArea">
        <div class="video-frame" id="videoFrame">
          <canvas class="preview-canvas" id="previewCanvas" width="480" height="270"></canvas>
          <div class="preview-overlay">
            <button class="play-btn-big" id="playBtn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 3l10 6-10 6V3z" fill="white"/></svg>
            </button>
          </div>
          <div class="timecode" id="timecode">00:00:00:00</div>
          <div class="safe-area-btn">Área segura</div>
        </div>
      </div>
      <div class="monitor-controls">
        <div class="transport">
          <button class="t-btn primary" id="playBtnTransport">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2.5l7 4.5-7 4.5V2.5z" fill="white"/></svg>
          </button>
        </div>
        <div class="playhead-scrub">
          <span class="scrub-time" id="scrubTime">00:00 / 01:30</span>
          <input type="range" min="0" max="100" value="0" class="scrub-bar" id="scrubBar">
        </div>
        <div class="vol-row">
          <span class="vol-label">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 5h3l4-3v10l-4-3H2V5z" fill="currentColor"/><path d="M11 4.5c1 0.7 1.5 1.5 1.5 2.5s-.5 1.8-1.5 2.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          </span>
          <input type="range" min="0" max="100" value="80" class="vol-slider" id="volSlider">
          <span class="vol-val" id="volVal">80%</span>
        </div>
      </div>
    </div>

    <!-- PROPERTIES PANEL -->
    <div class="panel properties">
      <div class="panel-header">
        <span class="panel-title">Propiedades</span>
      </div>
      <div class="prop-section">
        <div class="prop-section-title">Transformar</div>
        <div class="prop-row">
          <span class="prop-label">Escala</span>
          <input type="range" min="10" max="200" value="100" class="prop-slider" id="scaleSlider">
          <span style="font-size:10px;color:var(--muted);min-width:28px;text-align:right;" id="scaleVal">100%</span>
        </div>
        <div class="prop-row">
          <span class="prop-label">Rotación</span>
          <input type="range" min="-180" max="180" value="0" class="prop-slider" id="rotSlider">
          <span style="font-size:10px;color:var(--muted);min-width:28px;text-align:right;" id="rotVal">0°</span>
        </div>
        <div class="prop-row">
          <span class="prop-label">Pos. X</span>
          <input type="number" value="0" class="prop-input">
        </div>
        <div class="prop-row">
          <span class="prop-label">Pos. Y</span>
          <input type="number" value="0" class="prop-input">
        </div>
      </div>
      <div class="prop-section">
        <div class="prop-section-title">Apariencia</div>
        <div class="prop-row">
          <span class="prop-label">Opacidad</span>
          <input type="range" min="0" max="100" value="100" class="prop-slider" id="opacSlider">
          <span style="font-size:10px;color:var(--muted);min-width:28px;text-align:right;" id="opacVal">100%</span>
        </div>
        <div class="prop-row">
          <span class="prop-label">Brillo</span>
          <input type="range" min="-100" max="100" value="0" class="prop-slider">
        </div>
        <div class="prop-row">
          <span class="prop-label">Color</span>
          <div class="color-swatch" style="background:#3a7bd5;"></div>
          <div class="color-swatch" style="background:#e85d4a;"></div>
        </div>
      </div>
      <div class="prop-section">
        <button class="btn-small btn-accent">Aplicar cambios</button>
      </div>
    </div>

  </div>

  <!-- TIMELINE -->
  <div class="panel timeline">
    <div class="tl-header">
      <div class="tl-tools">
        <button class="tl-btn active" id="tl-select">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M1 1l3.5 9 1.5-3 3-1.5L1 1z" fill="currentColor"/></svg> Selec.
        </button>
        <button class="tl-btn" id="tl-split-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/><path d="M3 3.5l3-2.5 3 2.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg> Split
        </button>
        <button class="tl-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Añadir pista
        </button>
      </div>
      <div class="tl-zoom">
        <span class="tl-zoom-label">Zoom</span>
        <input type="range" min="50" max="300" value="100" id="tlZoom">
        <span class="tl-time-total" id="tlTimeTotal">01:30:00</span>
      </div>
    </div>
    <div class="tl-body" id="tlBody">
      <div class="tl-inner" id="tlInner">
        <div class="tl-ruler"><canvas id="rulerCanvas" height="24"></canvas></div>
        <div class="tl-tracks" id="tlTracks"></div>
        <div class="tl-playhead-head" id="phHead"></div>
        <div class="tl-playhead-line" id="phLine"></div>
      </div>
    </div>
  </div>

</div>
<script type="module" src="/main.js"></script>
</body>
</html>
