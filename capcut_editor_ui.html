
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
:root {
  --bg: var(--color-background-tertiary);
  --surface: var(--color-background-secondary);
  --panel: var(--color-background-primary);
  --border: var(--color-border-tertiary);
  --border2: var(--color-border-secondary);
  --text: var(--color-text-primary);
  --muted: var(--color-text-secondary);
  --hint: var(--color-text-tertiary);
  --accent: #3a7bd5;
  --accent2: #e85d4a;
  --tl-h: 190px;
  --track-h: 48px;
}

.editor { display: flex; flex-direction: column; height: 640px; background: var(--bg); gap: 2px; }

.top-row { display: flex; flex: 1; gap: 2px; min-height: 0; }

.panel { background: var(--panel); border: 0.5px solid var(--border); border-radius: var(--border-radius-md); overflow: hidden; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: var(--panel); border: 0.5px solid var(--border); border-radius: var(--border-radius-md); }
.tb-sep { width: 0.5px; height: 20px; background: var(--border2); margin: 0 4px; }
.tb-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; border: 0.5px solid transparent; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; background: none; transition: background 0.15s, color 0.15s; white-space: nowrap; }
.tb-btn:hover { background: var(--surface); color: var(--text); }
.tb-btn.active { background: var(--surface); color: var(--text); border-color: var(--border2); }
.tb-btn.danger { color: var(--accent2); }
.tb-btn.danger:hover { background: #fdf0ee; }
.tb-btn svg { flex-shrink: 0; }
.tb-spacer { flex: 1; }
.tb-label { font-size: 11px; font-weight: 500; color: var(--hint); padding: 0 6px; letter-spacing: 0.03em; text-transform: uppercase; }

/* RESOURCES PANEL */
.resources { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; }
.panel-header { display: flex; align-items: center; gap: 6px; padding: 10px 12px 8px; border-bottom: 0.5px solid var(--border); }
.panel-title { font-size: 12px; font-weight: 500; color: var(--muted); flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
.icon-btn { width: 24px; height: 24px; border-radius: 6px; border: 0.5px solid var(--border2); background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); }
.icon-btn:hover { background: var(--surface); color: var(--text); }

.res-tabs { display: flex; padding: 6px 8px; gap: 3px; }
.res-tab { flex: 1; padding: 4px 0; font-size: 11px; font-weight: 500; text-align: center; border-radius: 5px; border: none; cursor: pointer; background: none; color: var(--hint); transition: all 0.12s; }
.res-tab.active { background: var(--surface); color: var(--text); border: 0.5px solid var(--border2); }

.media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 8px; overflow-y: auto; flex: 1; }
.media-thumb { border-radius: 6px; overflow: hidden; cursor: pointer; border: 0.5px solid var(--border); position: relative; aspect-ratio: 16/9; background: var(--surface); }
.media-thumb:hover { border-color: var(--accent); }
.media-thumb.selected { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }
.thumb-canvas { width: 100%; height: 100%; display: block; }
.thumb-dur { position: absolute; bottom: 3px; right: 4px; font-size: 9px; font-weight: 600; background: rgba(0,0,0,0.65); color: #fff; border-radius: 3px; padding: 1px 4px; }
.thumb-type { position: absolute; top: 3px; left: 4px; font-size: 9px; font-weight: 600; border-radius: 3px; padding: 1px 4px; }
.tt-video { background: rgba(58,123,213,0.85); color: #fff; }
.tt-audio { background: rgba(232,93,74,0.85); color: #fff; }

.add-media { margin: 4px 8px 8px; padding: 8px; border-radius: 7px; border: 1px dashed var(--border2); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--hint); cursor: pointer; }
.add-media:hover { border-color: var(--accent); color: var(--accent); }

/* MONITOR */
.monitor { flex: 1; display: flex; flex-direction: column; }
.preview-area { flex: 1; background: #0a0a0a; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
.video-frame { position: relative; background: #000; border-radius: 4px; overflow: hidden; }
.preview-canvas { display: block; }
.preview-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.play-btn-big { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; }
.play-btn-big:hover { background: rgba(255,255,255,0.22); }
.timecode { position: absolute; bottom: 8px; left: 10px; font-size: 11px; font-weight: 600; color: #fff; font-family: var(--font-mono); letter-spacing: 0.05em; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; }
.safe-area-btn { position: absolute; top: 8px; right: 8px; font-size: 10px; color: rgba(255,255,255,0.5); border: 0.5px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); padding: 3px 7px; border-radius: 4px; cursor: pointer; }

.monitor-controls { padding: 8px 12px; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.transport { display: flex; align-items: center; justify-content: center; gap: 6px; }
.t-btn { width: 30px; height: 30px; border-radius: 7px; border: 0.5px solid var(--border2); background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); }
.t-btn:hover { background: var(--surface); }
.t-btn.primary { width: 36px; height: 36px; background: var(--accent); border-color: var(--accent); color: #fff; }
.t-btn.primary:hover { opacity: 0.88; }
.playhead-scrub { display: flex; align-items: center; gap: 8px; }
.scrub-bar { flex: 1; }
.scrub-time { font-size: 11px; font-family: var(--font-mono); color: var(--muted); min-width: 80px; text-align: center; }

.vol-row { display: flex; align-items: center; gap: 8px; }
.vol-label { font-size: 11px; color: var(--hint); width: 20px; }
.vol-slider { flex: 1; }
.vol-val { font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }

/* PROPERTIES */
.properties { width: 200px; flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; }
.prop-section { padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
.prop-section-title { font-size: 10px; font-weight: 500; color: var(--hint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.prop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.prop-label { font-size: 11px; color: var(--muted); width: 52px; flex-shrink: 0; }
.prop-input { flex: 1; font-size: 11px; padding: 3px 6px; border-radius: 5px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); }
.prop-slider { flex: 1; }
.color-swatch { width: 24px; height: 24px; border-radius: 5px; border: 0.5px solid var(--border2); cursor: pointer; flex-shrink: 0; }

.btn-small { padding: 4px 10px; font-size: 11px; font-weight: 500; border-radius: 5px; border: 0.5px solid var(--border2); background: none; color: var(--text); cursor: pointer; width: 100%; text-align: center; }
.btn-small:hover { background: var(--surface); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { opacity: 0.88; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { padding: 2px 7px; border-radius: 4px; font-size: 10px; border: 0.5px solid var(--border2); cursor: pointer; color: var(--muted); }
.tag:hover, .tag.active { background: var(--surface); color: var(--text); border-color: var(--border2); }

/* TIMELINE */
.timeline { height: var(--tl-h); flex-shrink: 0; display: flex; flex-direction: column; }
.tl-header { display: flex; align-items: center; padding: 5px 10px; border-bottom: 0.5px solid var(--border); gap: 8px; }
.tl-tools { display: flex; gap: 3px; }
.tl-btn { padding: 3px 8px; font-size: 11px; font-weight: 500; border-radius: 5px; border: 0.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.tl-btn:hover { background: var(--surface); color: var(--text); }
.tl-btn.active { background: var(--surface); border-color: var(--border2); color: var(--text); }
.tl-zoom { display: flex; align-items: center; gap: 5px; margin-left: auto; }
.tl-zoom-label { font-size: 10px; color: var(--hint); }
.tl-zoom input { width: 70px; }
.tl-time-total { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }

.tl-body { flex: 1; overflow-x: auto; overflow-y: auto; position: relative; }
.tl-inner { min-width: 900px; height: 100%; position: relative; }

.tl-ruler { height: 20px; background: var(--surface); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tl-ruler canvas { width: 100%; height: 100%; display: block; }

.tl-tracks { padding: 4px 0; }
.tl-track { display: flex; height: 46px; margin-bottom: 3px; align-items: center; }
.track-label { width: 72px; flex-shrink: 0; padding: 0 8px 0 10px; font-size: 10px; font-weight: 500; color: var(--hint); text-align: right; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; position: sticky; left: 0; background: var(--panel); z-index: 5; }
.track-label .t-ico { font-size: 14px; }
.track-area { flex: 1; position: relative; height: 100%; }

.clip { position: absolute; top: 3px; height: 38px; border-radius: 5px; cursor: pointer; overflow: hidden; display: flex; align-items: stretch; border: 1px solid transparent; transition: filter 0.1s; }
.clip:hover { filter: brightness(1.08); }
.clip.selected { border-color: #fff; box-shadow: 0 0 0 1.5px var(--accent); }
.clip-inner { flex: 1; display: flex; align-items: center; padding: 0 6px; min-width: 0; gap: 4px; }
.clip-name { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clip-thumb-row { display: flex; height: 100%; align-items: stretch; gap: 0; overflow: hidden; }
.clip-thumb-item { flex-shrink: 0; height: 100%; }
.clip-resize { width: 6px; flex-shrink: 0; cursor: col-resize; background: rgba(255,255,255,0.2); }

.clip-video { background: linear-gradient(135deg, #1a3a5c 0%, #2255a0 100%); border-color: rgba(100,160,255,0.3); }
.clip-video .clip-name { color: #b8d4ff; }
.clip-audio { background: linear-gradient(135deg, #3a1a1a 0%, #8a2a1a 100%); border-color: rgba(255,140,100,0.3); }
.clip-audio .clip-name { color: #ffbdaa; }
.clip-music { background: linear-gradient(135deg, #1a2a1a 0%, #2a6a2a 100%); border-color: rgba(100,200,100,0.3); }
.clip-music .clip-name { color: #b8ffb8; }
.clip-text-t { background: linear-gradient(135deg, #2a1a3a 0%, #5a2a8a 100%); border-color: rgba(180,120,255,0.3); }
.clip-text-t .clip-name { color: #d4b8ff; }

.waveform-canvas { position: absolute; top: 0; left: 0; height: 100%; opacity: 0.5; pointer-events: none; }

.playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent2); z-index: 20; pointer-events: none; }
.playhead::before { content: ''; position: absolute; top: -1px; left: -5px; width: 12px; height: 12px; background: var(--accent2); clip-path: polygon(50% 100%, 0 0, 100% 0); }

.tl-playhead-line { position: absolute; top: 20px; bottom: 0; width: 1.5px; background: var(--accent2); z-index: 15; left: 250px; pointer-events: none; }
.tl-playhead-head { position: absolute; top: 0; transform: translateX(-5px); width: 12px; height: 12px; background: var(--accent2); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 16; left: 250px; }
</style>

    </button>

    </button>

    </button>
  </div>

  <!-- MAIN ROW -->

    <!-- RESOURCES PANEL -->

          <span class="prop-label">Velocidad</span>
          <input type="range" min="10" max="400" value="100" class="prop-slider" id="speedSlider">
          <span style="font-size:10px;color:var(--muted);min-width:28px;text-align:right;" id="speedVal">1×</span>
        </div>
        <div class="tag-row" style="margin-top:2px;">
          <span class="tag active">0.5×</span>
          <span class="tag">1×</span>
          <span class="tag">1.5×</span>
          <span class="tag">2×</span>
        </div>
      </div>
      <div class="prop-section">
        <button class="btn-small btn-accent">Aplicar cambios</button>
      </div>
    </div>

  </div>

  <!-- TIMELINE -->
  <div class="panel timeline">
    <div class="tl-header">
      <div class="tl-tools">
        <button class="tl-btn active" id="tl-select">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M1 1l3.5 9 1.5-3 3-1.5L1 1z" fill="currentColor"/></svg>
          Selec.
        </button>
        <button class="tl-btn" id="tl-split-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/><path d="M3 3.5l3-2.5 3 2.5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          Split
        </button>
        <button class="tl-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Añadir pista
        </button>
      </div>
      <div class="tl-zoom">
        <span class="tl-zoom-label">Zoom</span>
        <input type="range" min="50" max="300" value="100" id="tlZoom">
        <span class="tl-time-total">01:30:00</span>
      </div>
    </div>
    <div class="tl-body" id="tlBody">
      <div class="tl-inner" id="tlInner">
        <div class="tl-ruler"><canvas id="rulerCanvas" height="20"></canvas></div>
        <div class="tl-tracks" id="tlTracks"></div>
        <div class="tl-playhead-head" id="phHead"></div>
        <div class="tl-playhead-line" id="phLine"></div>
      </div>
    </div>
  </div>

</div>

<script>
const clips = [
  { id:1, track:'video', label:'Clip_001.mp4', start:72, width:180, type:'video', thumbs:true },
  { id:2, track:'video', label:'Clip_002.mp4', start:260, width:140, type:'video', thumbs:true },
  { id:3, track:'video', label:'Clip_003.mp4', start:408, width:210, type:'video', thumbs:true },
  { id:4, track:'video', label:'Clip_004.mp4', start:626, width:130, type:'video', thumbs:true },
  { id:5, track:'audio', label:'Audio_entrevista.mp3', start:72, width:350, type:'audio', wave:true },
  { id:6, track:'music', label:'Musica_fondo.mp3', start:72, width:680, type:'audio', wave:true },
  { id:7, track:'text', label:'Título intro', start:90, width:120, type:'text' },
  { id:8, track:'text', label:'Subtítulo', start:300, width:90, type:'text' },
];

const tracks = [
  { id:'video', label:'Video', icon:'▶' },
  { id:'audio', label:'Audio', icon:'♪' },
  { id:'music', label:'Música', icon:'♫' },
  { id:'text', label:'Texto', icon:'T' },
];

function drawRuler() {
  const c = document.getElementById('rulerCanvas');
  const w = document.getElementById('tlInner').offsetWidth || 1100;
  c.width = w; c.height = 20;
  const ctx = c.getContext('2d');
  const style = getComputedStyle(document.documentElement);
  const tc = style.getPropertyValue('--color-text-tertiary') || '#999';
  ctx.fillStyle = tc;
  ctx.font = '9px monospace';
  ctx.textBaseline = 'top';
  for(let i = 0; i <= 90; i += 5) {
    const x = 72 + i * 7.8;
    const isBig = i % 15 === 0;
    ctx.fillStyle = isBig ? (style.getPropertyValue('--color-text-secondary')||'#666') : tc;
    ctx.fillRect(x, isBig ? 8 : 12, 1, isBig ? 12 : 7);
    if(isBig) {
      const secs = i;
      const label = `0:${String(secs).padStart(2,'0')}`;
      ctx.fillStyle = style.getPropertyValue('--color-text-secondary')||'#666';
      ctx.fillText(label, x+2, 2);
    }
  }
}

function drawWaveform(canvas, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = color;
  const mid = h/2;
  for(let x=0; x<w; x+=2) {
    const amp = (Math.sin(x*0.18)*0.3 + Math.sin(x*0.07)*0.5 + Math.random()*0.25) * mid * 0.85;
    ctx.fillRect(x, mid-amp, 1.5, amp*2);
  }
}

function buildTracks() {
  const container = document.getElementById('tlTracks');
  container.innerHTML = '';
  tracks.forEach(track => {
    const row = document.createElement('div');
    row.className = 'tl-track';

    const lbl = document.createElement('div');
    lbl.className = 'track-label';
    lbl.innerHTML = `<span class="t-ico">${track.icon}</span><span>${track.label}</span>`;
    row.appendChild(lbl);

    const area = document.createElement('div');
    area.className = 'track-area';
    area.dataset.track = track.id;

    clips.filter(c => c.track === track.id).forEach(clip => {
      const el = document.createElement('div');
      el.className = `clip clip-${clip.type === 'text' ? 'text-t' : clip.track === 'music' ? 'music' : clip.type === 'audio' ? 'audio' : 'video'}`;
      el.style.left = clip.start + 'px';
      el.style.width = clip.width + 'px';
      el.dataset.id = clip.id;

      if(clip.wave) {
        const wc = document.createElement('canvas');
        wc.className = 'waveform-canvas';
        wc.width = clip.width; wc.height = 38;
        el.appendChild(wc);
        const wcolor = clip.track === 'music' ? 'rgba(100,220,100,0.8)' : 'rgba(255,140,100,0.8)';
        setTimeout(() => drawWaveform(wc, wcolor), 0);
      }

      const inner = document.createElement('div');
      inner.className = 'clip-inner';
      inner.innerHTML = `<span class="clip-name">${clip.label}</span>`;
      el.appendChild(inner);

      const rR = document.createElement('div');
      rR.className = 'clip-resize';
      el.appendChild(rR);

      el.addEventListener('click', () => {
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
      });

      area.appendChild(el);
    });
    row.appendChild(area);
    container.appendChild(row);
  });
}

function buildMediaGrid() {
  const grid = document.getElementById('mediaGrid');
  const thumbData = [
    { label:'Clip_001', dur:'0:12', type:'VIDEO', hues:[30,60] },
    { label:'Clip_002', dur:'0:08', type:'VIDEO', hues:[200,230] },
    { label:'Clip_003', dur:'0:22', type:'VIDEO', hues:[120,150] },
    { label:'Audio_entre', dur:'0:35', type:'AUDIO', hues:[10,30] },
    { label:'Clip_004', dur:'0:09', type:'VIDEO', hues:[270,300] },
    { label:'Musica_fondo', dur:'1:20', type:'AUDIO', hues:[340,360] },
  ];
  thumbData.forEach((t, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'media-thumb' + (i===0?' selected':'');
    const c = document.createElement('canvas');
    c.className = 'thumb-canvas';
    c.width = 96; c.height = 54;
    const ctx = c.getContext('2d');
    if(t.type === 'VIDEO') {
      const g = ctx.createLinearGradient(0,0,96,54);
      g.addColorStop(0, `hsl(${t.hues[0]},40%,22%)`);
      g.addColorStop(1, `hsl(${t.hues[1]},50%,35%)`);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,96,54);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for(let r=0;r<3;r++) ctx.fillRect(8+r*28,14,20,26);
    } else {
      ctx.fillStyle = `hsl(${t.hues[0]},30%,18%)`;
      ctx.fillRect(0,0,96,54);
      ctx.fillStyle = `hsl(${t.hues[1]},70%,55%)`;
      ctx.strokeStyle = ctx.fillStyle;
      for(let x=2; x<94; x+=3) {
        const h = 6 + Math.sin(x*0.3)*8 + Math.random()*10;
        ctx.fillRect(x, 27-h/2, 2, h);
      }
    }
    wrap.appendChild(c);
    const dur = document.createElement('div');
    dur.className = 'thumb-dur'; dur.textContent = t.dur;
    wrap.appendChild(dur);
    const type = document.createElement('div');
    type.className = `thumb-type tt-${t.type.toLowerCase()}`;
    type.textContent = t.type;
    wrap.appendChild(type);
    wrap.addEventListener('click', () => {
      document.querySelectorAll('.media-thumb').forEach(m => m.classList.remove('selected'));
      wrap.classList.add('selected');
    });
    grid.appendChild(wrap);
  });
}

function drawPreview() {
  const c = document.getElementById('previewCanvas');
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,480,270);
  g.addColorStop(0,'#0d1b2e'); g.addColorStop(1,'#1a3a5a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,480,270);
  for(let i=0;i<8;i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.02+i*0.005})`;
    ctx.fillRect(40+i*55, 60+i*10, 40, 140);
  }
  ctx.fillStyle = 'rgba(58,123,213,0.15)';
  ctx.beginPath(); ctx.ellipse(240,135,180,90,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Vista previa', 240, 125);
  ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('Arrastra un clip al timeline para comenzar', 240, 150);
}

function sizePreview() {
  const area = document.getElementById('previewArea');
  const frame = document.getElementById('videoFrame');
  const canvas = document.getElementById('previewCanvas');
  const aw = area.clientWidth - 24;
  const ah = area.clientHeight - 16;
  const aspect = 16/9;
  let w = Math.min(aw, ah * aspect);
  let h = w / aspect;
  frame.style.width = Math.round(w) + 'px';
  frame.style.height = Math.round(h) + 'px';
  canvas.width = Math.round(w);
  canvas.height = Math.round(h);
  drawPreview();
}

let playheadX = 250;
let isDragging = false;

function updatePlayhead(x) {
  playheadX = Math.max(72, Math.min(x, 780));
  document.getElementById('phLine').style.left = playheadX + 'px';
  document.getElementById('phHead').style.left = playheadX + 'px';
  const secs = Math.round((playheadX - 72) / 7.8);
  const m = Math.floor(secs/60), s = secs%60;
  document.getElementById('timecode').textContent = `00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:00`;
  document.getElementById('scrubTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} / 01:30`;
  const pct = Math.round(((playheadX-72)/(780-72))*100);
  document.getElementById('scrubBar').value = pct;
}

document.getElementById('tlBody').addEventListener('mousedown', e => {
  const rect = document.getElementById('tlBody').getBoundingClientRect();
  isDragging = true;
  updatePlayhead(e.clientX - rect.left + document.getElementById('tlBody').scrollLeft);
});
document.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const rect = document.getElementById('tlBody').getBoundingClientRect();
  updatePlayhead(e.clientX - rect.left + document.getElementById('tlBody').scrollLeft);
});
document.addEventListener('mouseup', () => { isDragging = false; });

document.getElementById('scrubBar').addEventListener('input', e => {
  const pct = parseInt(e.target.value)/100;
  updatePlayhead(72 + pct*(780-72));
});

document.getElementById('volSlider').addEventListener('input', e => {
  document.getElementById('volVal').textContent = e.target.value + '%';
});
document.getElementById('scaleSlider').addEventListener('input', e => {
  document.getElementById('scaleVal').textContent = e.target.value + '%';
});
document.getElementById('rotSlider').addEventListener('input', e => {
  document.getElementById('rotVal').textContent = e.target.value + '°';
});
document.getElementById('opacSlider').addEventListener('input', e => {
  document.getElementById('opacVal').textContent = e.target.value + '%';
});
document.getElementById('speedSlider').addEventListener('input', e => {
  document.getElementById('speedVal').textContent = (e.target.value/100).toFixed(1) + '×';
});

const toolBtns = [document.getElementById('btn-select'), document.getElementById('btn-split'), document.getElementById('btn-trim')];
toolBtns.forEach(b => b.addEventListener('click', () => { toolBtns.forEach(x => x.classList.remove('active')); b.classList.add('active'); }));

const tlBtns = [document.getElementById('tl-select'), document.getElementById('tl-split-btn')];
tlBtns.forEach(b => b.addEventListener('click', () => { tlBtns.forEach(x => x.classList.remove('active')); b.classList.add('active'); }));

document.querySelectorAll('.res-tab').forEach(t => {
  t.addEventListener('click', () => { document.querySelectorAll('.res-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); });
});

document.querySelectorAll('.tag').forEach(t => {
  t.addEventListener('click', () => { document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active')); t.classList.add('active'); });
});

buildMediaGrid();
buildTracks();
drawRuler();
setTimeout(sizePreview, 50);
window.addEventListener('resize', sizePreview);
</script>
